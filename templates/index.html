<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LangGraph Web Research Agent</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for parsing markdown in bot responses -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --user-msg: rgba(139, 92, 246, 0.8);
            --bot-msg: rgba(51, 65, 85, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a 60%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.6));
        }

        .chat-box {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 8px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .message {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 1.05rem;
            animation: slideIn 0.3s ease-out;
        }

        .message a {
            color: #a78bfa;
            text-decoration: underline;
        }

        .message pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 10px;
        }

        .message code {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 4px;
            border-radius: 4px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--user-msg), #6d28d9);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        .bot-message {
            align-self: flex-start;
            background: var(--bot-msg);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .loading {
            align-self: flex-start;
            display: none;
            background: var(--bot-msg);
            padding: 12px 20px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .dots {
            display: inline-flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        .input-area {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1.05rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        button {
            padding: 0 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ─── Responsive: Tablet (≤ 768px) ─────────────────────────────── */
        @media (max-width: 768px) {
            body {
                align-items: stretch;
                height: 100dvh;
                /* dynamic viewport height - fixes mobile browser chrome */
            }

            .container {
                width: 100%;
                max-width: 100%;
                height: 100dvh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }

            .header {
                padding: 16px 20px;
                gap: 12px;
                /* account for notch / status bar on iOS */
                padding-top: calc(16px + env(safe-area-inset-top));
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .header p {
                font-size: 0.8rem;
            }

            .icon {
                font-size: 1.6rem;
            }

            .chat-box {
                padding: 16px;
                gap: 14px;
            }

            .message {
                max-width: 90%;
                padding: 12px 16px;
                font-size: 0.97rem;
            }

            .input-area {
                padding: 12px 16px;
                gap: 10px;
                /* stick above the home-indicator / nav bar on iOS & Android */
                padding-bottom: calc(12px + env(safe-area-inset-bottom));
            }

            input[type="text"] {
                padding: 13px 16px;
                font-size: 1rem;
                /* ≥ 16px prevents iOS auto-zoom */
            }

            button {
                padding: 0 22px;
                font-size: 1rem;
            }
        }

        /* ─── Responsive: Mobile (≤ 480px) ─────────────────────────────── */
        @media (max-width: 480px) {
            .header {
                padding: 12px 14px;
                padding-top: calc(12px + env(safe-area-inset-top));
                gap: 10px;
            }

            .header h1 {
                font-size: 1.05rem;
                line-height: 1.3;
            }

            .header p {
                font-size: 0.75rem;
            }

            .icon {
                font-size: 1.4rem;
            }

            .chat-box {
                padding: 12px;
                gap: 12px;
            }

            .message {
                max-width: 95%;
                padding: 10px 14px;
                font-size: 0.93rem;
                border-radius: 14px;
            }

            .input-area {
                padding: 10px 12px;
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
                gap: 8px;
            }

            input[type="text"] {
                padding: 12px 14px;
                font-size: 16px;
                /* hard 16px – prevents iOS zoom */
                border-radius: 10px;
            }

            /* Show only the SVG arrow on very small screens to save space */
            button {
                padding: 0 16px;
                border-radius: 10px;
                min-width: 48px;
                /* comfortable touch target */
                min-height: 48px;
                font-size: 0px;
                /* hide the "Send" text */
            }

            button svg {
                display: block;
                width: 22px;
                height: 22px;
                flex-shrink: 0;
            }
        }

        /* ─── Responsive: Very small (≤ 360px) ─────────────────────────── */
        @media (max-width: 360px) {
            .header h1 {
                font-size: 0.95rem;
            }

            .message {
                font-size: 0.88rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="icon">🤖</div>
            <div>
                <h1>LangGraph Advanced Research Agent</h1>
                <p>Powered by Groq + DuckDuckGo Web Search</p>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                Welcome! I'm an AI research assistant. I can search the internet for the most up-to-date
                information.<br><br>
                <strong>What would you like to know today?</strong>
            </div>

            <div class="loading" id="loadingIndicator">
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <span style="margin-left: 10px; color: #94a3b8; font-size: 0.9rem;">Agent is researching...</span>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask about recent news, tech trends, or any topic..."
                onkeypress="handleKeyPress(event)" autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">
                Send
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        /* ── Fix 100dvh fallback for browsers that don't support dynamic units ── */
        function setAppHeight() {
            document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
        }
        window.addEventListener('resize', setAppHeight);
        setAppHeight();

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');

            if (sender === 'bot') {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                // For user safely escape text
                msgDiv.textContent = text;
            }

            chatBox.insertBefore(msgDiv, loadingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';

            userInput.disabled = true;
            sendBtn.disabled = true;
            loadingIndicator.style.display = 'flex';
            loadingIndicator.style.alignItems = 'center';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();

                if (response.ok) {
                    appendMessage('bot', data.response);
                } else {
                    appendMessage('bot', '⚠️ Error: ' + (data.error || 'Something went wrong.'));
                }
            } catch (error) {
                appendMessage('bot', '⚠️ Connection Error: Could not reach the server.');
            } finally {
                loadingIndicator.style.display = 'none';
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>

</body>

</html>
